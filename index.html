<!DOCTYPE HTML><html><head><title>Discord Message Glitch</title><style>.btn{padding-top:5px;padding-bottom:5px;margin-right:5px}.inp{width:50px;text-align:center}.red{color:red}</style></head><body><h3>Discord Message Glitch</h3><script>function copy(){document.getElementById("out").select();document.getElementById("out").setSelectionRange(0, 99999);document.execCommand("copy");}function e(){document.getElementById("copy").disabled=false;document.getElementById("out").value=(f=(document.getElementById("vis").value+decodeURIComponent("%20%E2%80%AD")+(decodeURIComponent("%7C%7C%E2%80%8B%7C%7C").repeat(205))+" "+document.getElementById("txt").value).trim());document.getElementById("p").innerText='Length: '+f.length;document.getElementById("w").innerText=f.length>2000?(f.length-2000+" character"+(f.length==2001?"":"s")+" over limit"):"";document.getElementById("w").innerHTML+=f.length>2000?"<br/>":""}</script></script>Visible text: <input class="inp" type="text" id="vis"><br/>Surround links in visible text with &lt; and &gt; if you want to hide the embed of it<br/>Hidden text to show embeds: <input class="inp" type="text" id="txt"><br/><br/><input type="button" value="Generate Output" class="btn" onclick="e();"><input type="button" disabled="disabled" value="Copy" class="btn" id="copy" onclick="copy();"><br/><input readonly="readonly" type="text" id="out"> <br/><span id="w" class="red"></span><span id="p"></span><br/></body></html>
